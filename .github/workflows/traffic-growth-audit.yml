name: Traffic Growth Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "15 16 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: dependency-risk-digest-traffic-growth-audit
  cancel-in-progress: false

jobs:
  traffic-growth-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run traffic growth audit
        id: growth-audit
        continue-on-error: true
        run: npm run audit:growth

      - name: Open or update traffic growth issue
        if: steps.growth-audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "Dependency Risk Digest traffic growth needs attention";
            const body = fs.readFileSync("growth-audit-report.md", "utf8");
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: ["jdlao15"],
              });
            }

      - name: Close resolved traffic growth issue
        if: steps.growth-audit.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Dependency Risk Digest traffic growth needs attention";
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: "Traffic growth audit passed on the latest scheduled run. Closing this attention issue.",
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
              });
            }

      - name: Fail workflow on growth audit failure
        if: steps.growth-audit.outcome == 'failure'
        run: exit 1

