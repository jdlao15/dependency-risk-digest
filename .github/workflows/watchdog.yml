name: Dependency Risk Digest Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "45 14 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: dependency-risk-digest-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check production health
        id: watchdog
        continue-on-error: true
        run: node scripts/watchdog.mjs

      - name: Open or update attention issue
        if: steps.watchdog.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "Dependency Risk Digest needs attention";
            const body = fs.readFileSync("watchdog-failure.md", "utf8");
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                assignees: ["jdlao15"],
              });
            }

      - name: Fail workflow on unhealthy production
        if: steps.watchdog.outcome == 'failure'
        run: exit 1
