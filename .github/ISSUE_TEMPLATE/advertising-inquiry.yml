name: Advertising inquiry
description: Ask about a relevant ad placement on Dependency Risk Digest.
title: "Advertising inquiry"
assignees:
  - jdlao15
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in advertising on Dependency Risk Digest.

        Advertising inquiries are handled through this public GitHub issue form. Do not post secrets, private credentials, or private contact details here.
  - type: input
    id: organization
    attributes:
      label: Company or project
      description: Who would the ad represent?
      placeholder: Example Co.
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience you want to reach
      description: Describe the developers or teams you want to reach.
      placeholder: Frontend developers evaluating dependency security tools.
    validations:
      required: true
  - type: dropdown
    id: placement
    attributes:
      label: Preferred placement
      options:
        - Weekly digest ad slot
        - Package directory ad
        - Security-risk page ad
        - Not sure yet
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: Preferred public contact method
      description: Optional. Add a public website, GitHub username, or business contact page.
      placeholder: https://example.com/contact
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else that would help confirm audience fit.
    validations:
      required: false
